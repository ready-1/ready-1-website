{% extends "base.html" %}

{% block content %}
<section class="page-wrap">
  <div class="row justify-content-center">
    <article class="col-lg-9 page-card">
        <header class="mb-4">
            <h1 class="mb-3">{{ article.title }}</h1>
            <p class="article-meta mb-0"><time datetime="{{ article.date|strftime('%Y-%m-%d') }}">{{ article.date|strftime(DEFAULT_DATE_FORMAT) }}</time></p>
        </header>
        {% if article.og_image %}
            <img src="/images/{{ article.og_image }}" class="article-image w-100 my-3" alt="{{ article.title }}">
        {% endif %}

        {{ article.content }}
    </article>
  </div>
</section>
{% endblock %}
