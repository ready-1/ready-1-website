<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
  <head>
    {% include "head.html" %}{% block head %}{% endblock %}
  </head>

  <body class="{% if article %}article-view{% elif page %}page-view page-{{ page.slug }}{% elif category or tag or author or output_file in ['archives.html', 'categories.html', 'tags.html', 'authors.html'] %}listing-view{% else %}index-view{% endif %}">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include "navbar.html" %}

    <main id="main-content" class="container main-shell" tabindex="-1">{% block content %}{% endblock %}</main>

    {% include "footer.html" %}

    <script src="/theme/assets/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
