{% extends "base.html" %}
{% block content %}
<section class="page-wrap">
  <div class="row justify-content-center">
    <div class="col-lg-9 page-card">
      <h1>Article Categories</h1>
      <ul>
      {% for category, category_articles in categories %}
        <li><a href="/{{ category.url }}">{{ category }}</a> ({{ category_articles|count }})</li>
      {% endfor %}
      </ul>
    </div>
  </div>
</section>
{% endblock %}
