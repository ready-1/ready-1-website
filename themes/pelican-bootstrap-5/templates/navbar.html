{% set current_file = output_file|default('index.html') %}
{% set field_notes_active = current_file in ['archives.html', 'categories.html', 'tags.html', 'authors.html'] or article or category or tag or author %}
<nav class="navbar navbar-expand-lg" aria-label="Primary navigation">
  <div class="container main-shell">
    <a class="navbar-brand" href="/" aria-label="Ready-1 home"><span>Bob King</span><span class="brand-divider" aria-hidden="true">/</span><span class="brand-secondary">Ready-1</span></a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarReady1"
      aria-controls="navbarReady1"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="menu-glyph" aria-hidden="true"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarReady1">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link{% if current_file == 'about/index.html' %} active{% endif %}" href="/about/"{% if current_file == 'about/index.html' %} aria-current="page"{% endif %}>About</a></li>
        <li class="nav-item"><a class="nav-link{% if field_notes_active %} active{% endif %}" href="/archives.html"{% if field_notes_active %} aria-current="page"{% endif %}>Field notes</a></li>
        <li class="nav-item"><a class="nav-link{% if current_file == 'contact/index.html' %} active{% endif %}" href="/contact/"{% if current_file == 'contact/index.html' %} aria-current="page"{% endif %}>Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
